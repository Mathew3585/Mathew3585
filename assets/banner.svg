<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="Mathew Simon, développeur Unity">
  <defs>
    <radialGradient id="glow" cx="0.82" cy="0.12" r="0.62">
      <stop offset="0%" stop-color="#c26b3d" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#c26b3d" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c26b3d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.05" cy="0.95" r="0.5">
      <stop offset="0%" stop-color="#8a6d52" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#8a6d52" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e6a86e"/>
      <stop offset="52%" stop-color="#c26b3d"/>
      <stop offset="100%" stop-color="#7f4527"/>
    </linearGradient>
  </defs>

  <!-- fond creme du site -->
  <rect width="1200" height="340" rx="20" fill="#faf6f0"/>
  <rect width="1200" height="340" rx="20" fill="url(#glow)"/>
  <rect width="1200" height="340" rx="20" fill="url(#glow2)"/>
  <rect x="0.5" y="0.5" width="1199" height="339" rx="20" fill="none" stroke="#e4d8c7"/>

  <!-- kicker, comme sur le hero du site -->
  <text x="72" y="88" font-family="'Consolas', 'SF Mono', Menlo, monospace" font-size="15"
        letter-spacing="4.2" fill="#c26b3d">UNITY C# · C++ · GAMEPLAY</text>

  <!-- nom, second mot en accent comme sur le site -->
  <text x="70" y="196" font-family="Impact, 'Arial Black', 'Haettenschweiler', 'Helvetica Neue', sans-serif"
        font-size="96" letter-spacing="1.5" fill="#2a2320">MATHEW <tspan fill="#c26b3d">SIMON</tspan></text>

  <text x="73" y="240" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="23" fill="#6f6154">Jeux vidéo, expériences immersives et outils sur mesure</text>

  <!-- puces, style des chips du site -->
  <g font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14">
    <g>
      <rect x="73" y="266" width="118" height="32" rx="16" fill="#f3ebe0" stroke="#e4d8c7"/>
      <circle cx="93" cy="282" r="4" fill="#c26b3d"/>
      <text x="105" y="287" fill="#6f6154">Unity / C#</text>
    </g>
    <g>
      <rect x="201" y="266" width="96" height="32" rx="16" fill="#f3ebe0" stroke="#e4d8c7"/>
      <circle cx="221" cy="282" r="4" fill="#c26b3d"/>
      <text x="233" y="287" fill="#6f6154">VR / XR</text>
    </g>
    <g>
      <rect x="307" y="266" width="140" height="32" rx="16" fill="#f3ebe0" stroke="#e4d8c7"/>
      <circle cx="327" cy="282" r="4" fill="#c26b3d"/>
      <text x="339" y="287" fill="#6f6154">IA 100% locale</text>
    </g>
    <g>
      <rect x="457" y="266" width="122" height="32" rx="16" fill="#f3ebe0" stroke="#e4d8c7"/>
      <circle cx="477" cy="282" r="4" fill="#c26b3d"/>
      <text x="489" y="287" fill="#6f6154">Open source</text>
    </g>
  </g>

  <!-- carte chaude a droite, echo du portrait du hero -->
  <g transform="rotate(3 990 170)">
    <rect x="880" y="66" width="220" height="208" rx="30" fill="url(#card)"/>
    <rect x="880" y="66" width="220" height="208" rx="30" fill="none" stroke="#ffffff" stroke-opacity="0.14"/>
  </g>

  <!-- vague ambre par dessus la carte -->
  <g fill="#faf6f0" opacity="0.92">
    <rect x="912" y="168" width="6" height="20" rx="3"/>
    <rect x="926" y="152" width="6" height="52" rx="3"/>
    <rect x="940" y="132" width="6" height="92" rx="3"/>
    <rect x="954" y="116" width="6" height="124" rx="3"/>
    <rect x="968" y="146" width="6" height="64" rx="3"/>
    <rect x="982" y="164" width="6" height="28" rx="3"/>
    <rect x="996" y="128" width="6" height="100" rx="3"/>
    <rect x="1010" y="150" width="6" height="56" rx="3"/>
    <rect x="1024" y="138" width="6" height="80" rx="3"/>
    <rect x="1038" y="166" width="6" height="24" rx="3"/>
    <rect x="1052" y="154" width="6" height="48" rx="3"/>
  </g>
</svg>
